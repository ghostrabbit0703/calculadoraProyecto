<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>PROYECTO-CALCULADORA</title>
</head>

<body>
    <!--  -->
    <div class="container">
        <div class="titulo-proyecto">
            <h1>Proyecto Calculadora</h1>
            <p>Nombre: Jose Rummy Paco Villan</p>
        </div>
        <div class="marco-calculadora" id="marco-calculadora">
            <div class="marca-calculadora" id="marca-calculadora">CASIO</div>
            <div class="pantalla-calculadora" id="pantalla-calculadora">

            </div>
            <div class="botones-calculadora" id="botones-calculadora">
                <button class="limpiador" data-valor="C">C</button>
                <button class="operador" data-valor="+-">+-</button>
                <button class="operador" data-valor="%">$</button>
                <button class="operador" data-valor="/">/</button>

                <button class="numero" data-valor="7">7</button>
                <button class="numero" data-valor="8">8</button>
                <button class="numero" data-valor="9">9</button>
                <button class="operador" data-valor="X">X</button>

                <button class="numero" data-valor="4">4</button>
                <button class="numero" data-valor="5">5</button>
                <button class="numero" data-valor="6">6</button>
                <button class="operador" data-valor="-">-</button>

                <button class="numero" data-valor="1">1</button>
                <button class="numero" data-valor="2">2</button>
                <button class="numero" data-valor="3">3</button>
                <button class="operador" data-valor="+">+</button>

                <button class="numero" data-valor="0">0</button>
                <button class="operador" data-valor=".">.</button>
                <button class="operador" data-valor="=">=</button>
            </div>

        </div>

    </div>

</html>
