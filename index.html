<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>PROYECTO-CALCULADORA</title>
</head>

<body>
    <!--  -->
    <div class="container">
        <div class="project-title">
            <h1>Proyecto Calculadora</h1>
            <p>Nombre: Jose Rummy Paco Villan</p>
        </div>
        <div class="calculator-frame" >
            <div class="calculator-brand">CASIO</div>
            <div class="calculator-display" id="calculator-display">

            </div>
            <div class="calculator-buttons">
                <button class="clear-button" data-value="C">C</button>
                <button class="operator" data-value="+-">+-</button>
                <button class="operator" data-value="%">$</button>
                <button class="operator" data-value="/">/</button>

                <button class="number" data-value="7">7</button>
                <button class="number" data-value="8">8</button>
                <button class="number" data-value="9">9</button>
                <button class="operator" data-value="X">X</button>

                <button class="number" data-value="4">4</button>
                <button class="number" data-value="5">5</button>
                <button class="number" data-value="6">6</button>
                <button class="operator" data-value="-">-</button>

                <button class="number" data-value="1">1</button>
                <button class="number" data-value="2">2</button>
                <button class="number" data-value="3">3</button>
                <button class="operator" data-value="+">+</button>

                <button class="number" data-value="0">0</button>
                <button class="operator" data-value=".">.</button>
                <button class="operator" data-value="=">=</button>
            </div>

        </div>

    </div>
    <script src="script.js"></script>

</body>

</html>
